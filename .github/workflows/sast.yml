name: SAST

on:
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  opengrep:
    name: OpenGrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenGrep
        run: curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash -s -- -v v1.22.0

      - name: Run OpenGrep
        run: ~/.opengrep/cli/latest/opengrep scan --config auto --sarif-output opengrep.sarif --error .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: opengrep.sarif
          category: opengrep
